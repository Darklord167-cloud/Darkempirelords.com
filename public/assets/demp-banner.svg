<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#150000" />
      <stop offset="100%" stop-color="#050000" />
    </radialGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="primaryTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>
  
  <!-- Grid overlay -->
  <g stroke="#ff0000" stroke-opacity="0.05" stroke-width="1">
    <path d="M0,105 L1200,105 M0,210 L1200,210 M0,315 L1200,315 M0,420 L1200,420 M0,525 L1200,525" />
    <path d="M200,0 L200,630 M400,0 L400,630 M600,0 L600,630 M800,0 L800,630 M1000,0 L1000,630" />
  </g>
  
  <!-- Logo on the left -->
  <g transform="translate(110, 155)">
    <circle cx="160" cy="160" r="150" fill="#000" stroke="#ff0000" stroke-width="2" opacity="0.6"/>
    <circle cx="160" cy="160" r="140" fill="none" stroke="#ff0000" stroke-width="4" stroke-dasharray="10 5" opacity="0.8"/>
    <circle cx="160" cy="160" r="120" fill="none" stroke="#ff0000" stroke-width="2"/>
    <path d="M160,50 L200,120 L270,160 L200,200 L160,270 L120,200 L50,160 L120,120 Z" fill="#ff0000"/>
    <circle cx="160" cy="160" r="45" fill="#000000" stroke="#ff0000" stroke-width="6"/>
    <circle cx="160" cy="160" r="20" fill="#ff0000"/>
  </g>

  <!-- Text -->
  <text x="500" y="220" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="#ff4444" letter-spacing="10">COMMAND THE DIGITAL FRONTIER</text>
  <text x="500" y="320" font-family="Arial, sans-serif" font-weight="900" font-size="110" fill="url(#textGrad)" letter-spacing="4">DARK</text>
  <text x="500" y="420" font-family="Arial, sans-serif" font-weight="900" font-size="110" fill="url(#primaryTextGrad)" letter-spacing="6">EMPIRE</text>
  
  <rect x="500" y="460" width="600" height="2" fill="#ff0000" opacity="0.3"/>
  <rect x="500" y="460" width="200" height="2" fill="#ff0000"/>
  
  <text x="500" y="520" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" letter-spacing="6">OFFICIAL $DEMP TOKEN</text>
  <text x="500" y="560" font-family="Courier New, monospace" font-weight="bold" font-size="18" fill="#ff0000" letter-spacing="4">AI // TRADING // AUTOMATION</text>

  <!-- Borders/Accents -->
  <path d="M 40 40 L 120 40 L 130 50" fill="none" stroke="#ff0000" stroke-width="3" />
  <path d="M 1160 590 L 1080 590 L 1070 580" fill="none" stroke="#ff0000" stroke-width="3" />
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.2" />
</svg>
